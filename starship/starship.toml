# Starship Configuration
# Symlinked to ~/.config/starship.toml

# Get editor completions
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$line_break\
$character"""

# Directory customization
[directory]
style = "bold cyan"
truncate_to_repo = true
truncation_length = 3
read_only = " 🔒"

# Character indicator (prompt cursor)
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold blue)"

# Git status
[git_branch]
symbol = " "
style = "bold mauve"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "🏳 "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = ""
stashed = "📦"
modified = "📝"
staged = " "
renamed = "🚚"
deleted = "🗑 "

# Language stats (using Nerd Font glyphs)
[python]
symbol = "🐍 "
style = "bold yellow"

[nodejs]
symbol = " "
style = "bold green"

[rust]
symbol = "🦀 "
style = "bold red"

[golang]
symbol = " "
style = "bold blue"
